# NexGen Credit Risk Gateway — Spring Boot configuration

# Bureau settings
bureau.endpoint-url=https://qa.nexgenservices.com:9443/services/bureau/creditcheck
bureau.request-id-prefix=nexgen-
bureau.subscriber-code=NEXGEN-001
bureau.subscriber-name=NexGen Financial

# Scoring
scoring.default-strategy=standard

# MongoDB transaction logging
mongo.host=localhost
mongo.port=27017
mongo.db=nexgen_creditrisk
mongo.collection=transactions
